<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1025"/>
      <stop offset="100%" stop-color="#0f1729"/>
    </linearGradient>
    <linearGradient id="accent" x1="100" y1="100" x2="300" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <!-- Headband -->
  <path d="M130 180 Q130 110 200 100 Q270 110 270 180" stroke="url(#accent)" stroke-width="12" stroke-linecap="round" fill="none"/>
  <!-- Left ear cup -->
  <rect x="110" y="170" width="50" height="70" rx="20" fill="url(#accent)" opacity="0.9"/>
  <rect x="118" y="185" width="34" height="40" rx="12" fill="#1a1025" opacity="0.5"/>
  <!-- Right ear cup -->
  <rect x="240" y="170" width="50" height="70" rx="20" fill="url(#accent)" opacity="0.9"/>
  <rect x="248" y="185" width="34" height="40" rx="12" fill="#1a1025" opacity="0.5"/>
  <!-- Cushion details -->
  <ellipse cx="135" cy="205" rx="14" ry="18" fill="white" opacity="0.08"/>
  <ellipse cx="265" cy="205" rx="14" ry="18" fill="white" opacity="0.08"/>
  <!-- Glow -->
  <circle cx="200" cy="200" r="120" fill="url(#accent)" opacity="0.05"/>
</svg>

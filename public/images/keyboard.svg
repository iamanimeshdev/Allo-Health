<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="80" y1="150" x2="320" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <!-- Keyboard base -->
  <rect x="70" y="170" width="260" height="90" rx="12" fill="url(#accent)" opacity="0.85"/>
  <!-- Key rows -->
  <g opacity="0.3" fill="#0f1729">
    <rect x="85" y="180" width="18" height="14" rx="3"/>
    <rect x="107" y="180" width="18" height="14" rx="3"/>
    <rect x="129" y="180" width="18" height="14" rx="3"/>
    <rect x="151" y="180" width="18" height="14" rx="3"/>
    <rect x="173" y="180" width="18" height="14" rx="3"/>
    <rect x="195" y="180" width="18" height="14" rx="3"/>
    <rect x="217" y="180" width="18" height="14" rx="3"/>
    <rect x="239" y="180" width="18" height="14" rx="3"/>
    <rect x="261" y="180" width="18" height="14" rx="3"/>
    <rect x="283" y="180" width="30" height="14" rx="3"/>
    <!-- Row 2 -->
    <rect x="85" y="198" width="26" height="14" rx="3"/>
    <rect x="115" y="198" width="18" height="14" rx="3"/>
    <rect x="137" y="198" width="18" height="14" rx="3"/>
    <rect x="159" y="198" width="18" height="14" rx="3"/>
    <rect x="181" y="198" width="18" height="14" rx="3"/>
    <rect x="203" y="198" width="18" height="14" rx="3"/>
    <rect x="225" y="198" width="18" height="14" rx="3"/>
    <rect x="247" y="198" width="18" height="14" rx="3"/>
    <rect x="269" y="198" width="44" height="14" rx="3"/>
    <!-- Row 3 -->
    <rect x="85" y="216" width="30" height="14" rx="3"/>
    <rect x="119" y="216" width="18" height="14" rx="3"/>
    <rect x="141" y="216" width="18" height="14" rx="3"/>
    <rect x="163" y="216" width="18" height="14" rx="3"/>
    <rect x="185" y="216" width="18" height="14" rx="3"/>
    <rect x="207" y="216" width="18" height="14" rx="3"/>
    <rect x="229" y="216" width="18" height="14" rx="3"/>
    <rect x="251" y="216" width="62" height="14" rx="3"/>
    <!-- Spacebar -->
    <rect x="120" y="234" width="160" height="14" rx="3"/>
  </g>
  <!-- Reflection/glow -->
  <ellipse cx="200" cy="210" rx="140" ry="50" fill="url(#accent)" opacity="0.06"/>
  <!-- Palm rest hint -->
  <rect x="90" y="265" width="220" height="20" rx="10" fill="url(#accent)" opacity="0.15"/>
</svg>
